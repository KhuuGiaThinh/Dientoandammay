{% extends "base.html" %}
{% block title %}Hồ sơ cá nhân — FoodNow{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <h5 class="mb-3">Thông tin cá nhân</h5>
        <form method="post" action="{{ url_for('profile_update') }}" class="row g-3">
          <div class="col-12">
            <label class="form-label">Họ và tên</label>
            <input name="full_name" class="form-control" value="{{ profile.full_name or '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Số điện thoại</label>
            <input name="phone" class="form-control" value="{{ profile.phone or '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" value="{{ profile.email or '' }}" disabled>
          </div>
          <div class="col-12">
            <label class="form-label">Địa chỉ mặc định</label>
            <textarea name="address" class="form-control" rows="2">{{ profile.address or '' }}</textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Cập nhật hồ sơ</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <h5 class="mb-3">Đổi mật khẩu</h5>
        <form method="post" action="{{ url_for('profile_password') }}">
          <div class="mb-3">
            <label class="form-label">Mật khẩu cũ</label>
            <input type="password" name="old_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu mới</label>
            <input type="password" name="new_password" class="form-control" required>
          </div>
          <button class="btn btn-outline-primary" type="submit">Đổi mật khẩu</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
